<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../../css/51-modern-default.css">
  <link rel="stylesheet" href="../css/config.css">
</head>

<body>
  <section class="settings">
    <h2 class="settings-title">PDF結合プラグイン設定</h2>
    <p class="settings-description">
      このプラグインには設定項目はありません。<br>
      インストールするだけで、レコード詳細画面のヘッダーメニューに「PDF結合」ボタンが表示されます。
    </p>

    <div class="kintoneplugin-row">
      <button type="button" id="config_submit" class="kintoneplugin-button-dialog-ok">保存する</button>
      <button type="button" id="config_cancel" class="kintoneplugin-button-dialog-cancel">キャンセル</button>
    </div>
  </section>
</body>

</html>
